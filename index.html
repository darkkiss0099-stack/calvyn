<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAGUARX | OFFICIAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root { 
            --primary: #ffffff; 
            --secondary: #888888; 
            --bg-dark: #050505;
            --accent: #ffffff; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        
        body { 
            background: var(--bg-dark);
            color: #fff; 
            height: 100vh; 
            font-family: 'Rajdhani', sans-serif; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        /* Background Image พร้อม Overlay มืดๆ แบบในรูป */
        .main-bg {
            position: fixed;
            inset: 0;
            background: url('https://img2.pic.in.th/asdsad50554b77f7067d99.png') center/cover no-repeat;
            z-index: -2;
            filter: brightness(0.15) contrast(1.2);
        }
        .overlay { 
            position: fixed; 
            inset: 0; 
            background: radial-gradient(circle, transparent 10%, #000 120%); 
            z-index: -1; 
        }

        /* กรอบมุมจอ (UI Frames) */
        .corner-frame {
            position: fixed;
            inset: 20px;
            pointer-events: none;
            z-index: 5;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .corner-frame::before, .corner-frame::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        /* มุมซ้ายบนและขวาล่าง */
        .corner-frame::before { top: -1px; left: -1px; border-right: 0; border-bottom: 0; }
        .corner-frame::after { bottom: -1px; right: -1px; border-left: 0; border-top: 0; }

        /* Branding UI Center */
        .main-content { 
            position: relative; 
            z-index: 10; 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            width: 100%;
        }

        .est-text {
            font-family: 'Orbitron';
            font-size: 0.65rem;
            letter-spacing: 8px;
            color: var(--secondary);
            margin-bottom: 15px;
            position: relative;
        }
        /* เส้นประข้าง EST 2025 */
        .est-text::before, .est-text::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40px;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }
        .est-text::before { left: -50px; }
        .est-text::after { right: -50px; }

        /* โลโก้ตัว V/G ตรงกลาง */
        .main-logo {
            width: 120px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.2));
        }

        .brand-name { 
            font-family: 'Montserrat', sans-serif; 
            font-size: 5.5rem; 
            font-weight: 800; 
            letter-spacing: 15px; 
            text-transform: uppercase; 
            line-height: 1;
            color: #bcbcbc;
            margin-bottom: 40px;
        }

        /* เส้นขั้นก่อนปุ่ม */
        .divider-line {
            width: 150px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            margin-bottom: 30px;
        }

        .member-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 30px;
            border-radius: 4px;
            text-decoration: none;
            color: #888;
            transition: 0.3s;
            font-family: 'Orbitron';
            font-size: 0.6rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .member-btn i { font-size: 0.8rem; opacity: 0.6; }
        .member-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        /* Music Player UI - ล่างขวา */
        .bottom-ui { 
            position: fixed; 
            bottom: 30px; 
            right: 30px; 
            z-index: 100; 
        }

        .music-mini-player { 
            display: flex; 
            align-items: center; 
            background: rgba(15, 15, 15, 0.9); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 6px; 
            width: 240px;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }
        .mini-art { width: 40px; height: 40px; object-fit: cover; }
        .mini-info { flex: 1; padding-left: 12px; }
        .mini-title { font-family: 'Orbitron'; font-size: 0.55rem; font-weight: 700; display: block; color: #fff; letter-spacing: 1px; }
        .mini-artist { font-size: 0.5rem; color: #666; text-transform: uppercase; }
        .mini-btn { padding: 0 10px; font-size: 0.6rem; color: #fff; border-left: 1px solid rgba(255,255,255,0.1); margin-left: 10px; }

        .credit-footer {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            font-family: 'Orbitron'; font-size: 0.5rem; color: #333; letter-spacing: 4px;
            text-transform: uppercase;
        }

        @media (max-width: 768px) { 
            .brand-name { font-size: 2.5rem; letter-spacing: 8px; } 
            .main-logo { width: 80px; }
            .bottom-ui { right: 10px; bottom: 10px; width: 220px; scale: 0.8; transform-origin: bottom right; }
        }
    </style>
</head>
<body>

    <div class="main-bg"></div>
    <div class="overlay"></div>
    <div class="corner-frame"></div>

    <div class="main-content">
        <div class="est-text">EST. 2025</div>
        
        <img src="https://i.imgur.com/uR1jWqB.png" class="main-logo" alt="Logo">
        
        <h1 class="brand-name">JAGUARX</h1>
        
        <div class="divider-line"></div>

        <a href="#" class="member-btn">
            <i class="fa-solid fa-user-group"></i>
            <span>Members</span>
        </a>
    </div>

    <div class="credit-footer">SYSTEM DESIGN BY MALI CLOUD</div>

    <div class="bottom-ui">
        <div class="music-mini-player">
            <img src="https://i1.sndcdn.com/artworks-000412693845-tqisqj-t500x500.jpg" class="mini-art" alt="Art">
            <div class="mini-info">
                <span class="mini-title">COME THROUGH</span>
                <span class="mini-artist">THE WEEKND</span>
            </div>
            <div class="mini-btn"><i class="fa-solid fa-bars-staggered"></i></div>
        </div>
    </div>

    <div id="yt-player" style="display:none;"></div>

    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.append(tag);

        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '0', width: '0', videoId: 'xy3AcmW0lrQ',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'xy3AcmW0lrQ' },
                events: { 'onReady': (e) => e.target.setVolume(20) }
            });
        }

        // กดที่ไหนก็ได้ในหน้าจอครั้งแรกเพื่อให้เพลงเล่น (Policy ของ Browser)
        document.body.addEventListener('click', () => {
            if(player) player.playVideo();
        }, { once: true });
    </script>
</body>
</html>
