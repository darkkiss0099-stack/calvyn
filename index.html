<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALVYN | OFFICIAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root { --primary: #fff; --secondary: #888; --bg: #000; --accent: #ff3333; }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        
        body { 
            background: #000;
            color: #fff; 
            height: 100vh; 
            font-family: 'Rajdhani', sans-serif; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        /* Background Image */
        .main-bg {
            position: fixed;
            inset: 0;
            background: url('https://img2.pic.in.th/asdsad50554b77f7067d99.png') center/cover no-repeat;
            z-index: -2;
            filter: brightness(0.3);
        }
        .overlay { position: fixed; inset: 0; background: radial-gradient(circle, transparent 20%, #000 100%); z-index: -1; }

        /* Branding UI */
        .main-content { 
            position: relative; 
            z-index: 10; 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 15px;
        }

        .brand-name { 
            font-family: 'Orbitron'; 
            font-size: 5.5rem; 
            font-weight: 900; 
            letter-spacing: 20px; 
            text-transform: uppercase; 
            line-height: 1;
            color: #fff;
            margin-bottom: 20px;
        }

        /* --- Members Plate Design --- */
        .member-plate {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px 35px;
            border-radius: 8px;
            text-decoration: none;
            color: #fff;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(5px);
        }
        .member-plate:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }
        .member-plate i { font-size: 1.1rem; color: #aaa; }
        .member-plate span {
            font-family: 'Orbitron';
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* --- Music Mini Player (Bottom Right) --- */
        .bottom-ui { 
            position: fixed; 
            bottom: 25px; 
            right: 25px; 
            z-index: 100; 
        }

        .music-mini-player { 
            display: flex; 
            align-items: center; 
            background: rgba(10, 10, 10, 0.9); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            padding: 8px 12px; 
            width: 260px;
            cursor: pointer;
            border-radius: 2px;
            transition: 0.3s;
        }
        .music-mini-player:hover { background: rgba(20, 20, 20, 1); border-color: rgba(255,255,255,0.1); }
        
        .mini-art { width: 40px; height: 40px; object-fit: cover; border-radius: 1px; }
        .mini-info { flex: 1; padding-left: 12px; }
        .mini-title { font-family: 'Orbitron'; font-size: 0.65rem; font-weight: 700; display: block; letter-spacing: 1px; }
        .mini-artist { font-size: 0.55rem; color: #444; text-transform: uppercase; margin-top: 2px; }
        .mini-btn { font-size: 0.7rem; color: #666; margin-left: 10px; }

        /* Full Player (Modal) */
        .full-player {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            width: 360px; background: #0c0c0c; border: 1px solid #1a1a1a;
            padding: 25px; z-index: 2000; visibility: hidden; opacity: 0; transition: 0.3s ease;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        .full-player.active { visibility: visible; opacity: 1; transform: translate(-50%, -50%) scale(1); }
        
        .full-art { width: 100%; height: 180px; object-fit: cover; border: 1px solid #1a1a1a; margin-bottom: 20px; }
        .full-title { font-family: 'Orbitron'; font-size: 1.2rem; font-weight: 700; text-align: center; margin-bottom: 5px; }
        .full-artist { font-size: 0.6rem; color: #444; text-align: center; letter-spacing: 2px; margin-bottom: 25px; }
        
        input[type="range"] { -webkit-appearance: none; width: 100%; background: #1a1a1a; height: 2px; outline: none; margin-bottom: 8px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 6px; height: 6px; background: #fff; cursor: pointer; }
        
        .play-pause-btn { 
            width: 100%; padding: 15px; background: #fff; color: #000; border: none; 
            font-family: 'Orbitron'; font-size: 0.75rem; font-weight: 900; cursor: pointer; transition: 0.2s;
        }
        .play-pause-btn:hover { background: var(--accent); color: #fff; }

        .credit-text {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            font-family: 'Orbitron'; font-size: 0.5rem; color: #222; letter-spacing: 4px;
        }

        @media (max-width: 768px) { .brand-name { font-size: 2.8rem; letter-spacing: 10px; } .music-mini-player { width: 220px; } }
    </style>
</head>
<body>

    <div class="main-bg"></div>
    <div class="overlay"></div>

    <div class="main-content">
        <h1 class="brand-name" id="typewriter"></h1>
        <a href="http://member.calvyn.site/#" target="_blank" class="member-plate">
            <i class="fa-solid fa-people-group"></i>
            <span>Members</span>
        </a>
    </div>

    <div class="credit-text">SYSTEM DESIGN BY OSHI</div>

    <div class="bottom-ui">
        <div class="music-mini-player" onclick="toggleFullPlayer()">
            <img src="https://i.ytimg.com/vi/xy3AcmW0lrQ/maxresdefault.jpg" class="mini-art" alt="Art">
            <div class="mini-info">
                <span class="mini-title">COME THROUGH</span>
                <span class="mini-artist">THE WEEKND</span>
            </div>
            <div class="mini-btn" id="miniPlayBtn">||</div>
        </div>
    </div>

    <div class="full-player" id="fullPlayer">
        <div style="display:flex; justify-content:space-between; font-size:9px; color:#333; margin-bottom:15px; font-family:'Orbitron'">
            <span onclick="toggleFullPlayer()" style="cursor:pointer">HIDE PLAYER</span>
            <span style="color:#ff3333">● NOW PLAYING</span>
        </div>
        <img src="https://i.ytimg.com/vi/xy3AcmW0lrQ/maxresdefault.jpg" class="full-art" alt="Art">
        <h2 class="full-title">COME THROUGH</h2>
        <p class="full-artist">THE WEEKND</p>
        
        <input type="range" id="progressBar" value="0">
        <div style="display:flex; justify-content:space-between; font-size:10px; color:#333; margin-bottom:20px;">
            <span id="currentTime">0:00</span>
            <span id="durationTime">0:00</span>
        </div>
        
        <button class="play-pause-btn" id="fullPlayBtn" onclick="togglePlayPause(event)">PAUSE</button>
    </div>

    <div id="yt-player" style="display:none;"></div>

    <script>
        // Typewriter
        const textElement = document.getElementById('typewriter'), text = "CALVYN";
        let index = 0, isDeleting = false;
        function type() {
            let speed = isDeleting ? 150 : 300;
            textElement.innerText = text.substring(0, index);
            if (!isDeleting && index < text.length) index++;
            else if (isDeleting && index > 0) index--;
            else { isDeleting = !isDeleting; speed = 2500; }
            setTimeout(type, speed);
        }

        // YouTube Logic
        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '0', width: '0', videoId: 'xy3AcmW0lrQ',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'xy3AcmW0lrQ' },
                events: { 'onReady': (e) => { e.target.setVolume(30); startProgress(); } }
            });
        }

        function startProgress() {
            setInterval(() => {
                if (player && player.getCurrentTime) {
                    const curr = player.getCurrentTime();
                    const dur = player.getDuration();
                    document.getElementById('progressBar').value = (curr / dur) * 100;
                    document.getElementById('currentTime').innerText = formatTime(curr);
                    document.getElementById('durationTime').innerText = formatTime(dur);
                }
            }, 500);
        }

        function formatTime(s) {
            const m = Math.floor(s/60);
            const r = Math.floor(s%60);
            return `${m}:${r < 10 ? '0' : ''}${r}`;
        }

        function togglePlayPause(e) {
            if(e) e.stopPropagation();
            const mBtn = document.getElementById('miniPlayBtn');
            const fBtn = document.getElementById('fullPlayBtn');
            if (player.getPlayerState() === 1) {
                player.pauseVideo();
                mBtn.innerText = "▶";
                fBtn.innerText = "PLAY";
            } else {
                player.playVideo();
                mBtn.innerText = "||";
                fBtn.innerText = "PAUSE";
            }
        }

        function toggleFullPlayer() {
            document.getElementById('fullPlayer').classList.toggle('active');
        }

        document.getElementById('progressBar').addEventListener('input', (e) => {
            player.seekTo((e.target.value / 100) * player.getDuration());
        });

        window.onload = type;
        document.body.addEventListener('click', () => player && player.playVideo(), { once: true });
        
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.append(tag);
    </script>
</body>
</html>
