<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALVYN | OFFICIAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #fff; --secondary: #888; --bg: #000; --accent: #ff3333; }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        
        body { 
            background: #000;
            color: #fff; 
            height: 100vh; 
            font-family: 'Rajdhani', sans-serif; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        /* Background Image */
        .main-bg {
            position: fixed;
            inset: 0;
            background: url('https://img2.pic.in.th/asdsad50554b77f7067d99.png') center/cover no-repeat;
            z-index: -2;
            filter: brightness(0.3) grayscale(0.5);
        }
        .overlay { position: fixed; inset: 0; background: radial-gradient(circle, transparent 20%, #000 100%); z-index: -1; }

        /* Main Branding UI */
        .main-content { 
            position: relative; 
            z-index: 10; 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 20px;
        }

        .logo-icon {
            font-family: 'Orbitron';
            font-size: 0.7rem;
            letter-spacing: 5px;
            color: #444;
            margin-bottom: -10px;
        }

        .brand-name { 
            font-family: 'Orbitron'; 
            font-size: 6rem; 
            font-weight: 900; 
            letter-spacing: 20px; 
            text-transform: uppercase; 
            line-height: 1;
            color: #e0e0e0;
            text-shadow: 0 0 50px rgba(255,255,255,0.1);
        }

        .member-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 40px;
            color: #666;
            text-decoration: none;
            font-family: 'Orbitron';
            font-size: 0.65rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: 0.4s;
            margin-top: 20px;
        }
        .member-btn:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        /* --- Music Player (Fixed Bottom Right) --- */
        .bottom-ui { 
            position: fixed; 
            bottom: 20px; 
            right: 20px; 
            z-index: 100; 
        }

        .music-mini-player { 
            display: flex; 
            align-items: center; 
            background: rgba(15, 15, 15, 0.9); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            padding: 6px; 
            width: 250px;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }
        .mini-art { width: 35px; height: 35px; object-fit: cover; border-radius: 2px; }
        .mini-info { flex: 1; padding-left: 12px; }
        .mini-title { font-family: 'Orbitron'; font-size: 0.6rem; font-weight: 700; display: block; color: #fff; letter-spacing: 1px; }
        .mini-artist { font-size: 0.5rem; color: #555; text-transform: uppercase; }
        .mini-btn { padding: 0 10px; font-size: 0.7rem; color: #fff; border-left: 1px solid rgba(255, 255, 255, 0.1); margin-left: 10px; }

        /* Full Player Modal */
        .full-player {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            width: 350px; background: #0a0a0a; border: 1px solid #1a1a1a;
            padding: 25px; z-index: 2000; visibility: hidden; opacity: 0; transition: 0.3s;
        }
        .full-player.active { visibility: visible; opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .full-art-container { width: 100%; height: 180px; background: #000; margin-bottom: 20px; border: 1px solid #1a1a1a; }
        .full-art-container img { width: 100%; height: 100%; object-fit: cover; }
        .full-title { font-family: 'Orbitron'; font-size: 1.1rem; font-weight: 700; text-align: center; margin-bottom: 5px; }
        .full-artist { font-size: 0.6rem; color: #444; text-align: center; margin-bottom: 20px; letter-spacing: 2px; }
        
        .progress-container { width: 100%; margin-bottom: 15px; }
        input[type="range"] { -webkit-appearance: none; width: 100%; background: #1a1a1a; height: 2px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 8px; height: 8px; background: #fff; cursor: pointer; }
        .time-info { display: flex; justify-content: space-between; font-size: 0.55rem; color: #333; margin-top: 5px; }
        
        .play-pause-btn { 
            width: 100%; padding: 12px; background: #fff; color: #000; border: none; 
            font-family: 'Orbitron'; font-size: 0.7rem; font-weight: 900; cursor: pointer;
        }

        .footer-credit {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            font-family: 'Orbitron'; font-size: 0.5rem; color: #222; letter-spacing: 3px;
        }

        @media (max-width: 768px) { .brand-name { font-size: 3rem; letter-spacing: 10px; } }
    </style>
</head>
<body>

    <div class="main-bg"></div>
    <div class="overlay"></div>

    <div class="main-content">
        <div class="logo-icon">EST. 2026</div>
        <h1 class="brand-name" id="typewriter"></h1>
        <a href="http://member.calvyn.site/#" target="_blank" class="member-btn">Members</a>
    </div>

    <div class="footer-credit">SYSTEM DESIGN BY OSHI</div>

    <div class="bottom-ui">
        <div class="music-mini-player" onclick="toggleFullPlayer()">
            <img src="https://i.ytimg.com/vi/xy3AcmW0lrQ/maxresdefault.jpg" class="mini-art" alt="Art">
            <div class="mini-info">
                <span class="mini-title">COME THROUGH</span>
                <span class="mini-artist">THE WEEKND</span>
            </div>
            <div class="mini-btn" id="miniPlayBtn">||</div>
        </div>
    </div>

    <div class="full-player" id="fullPlayer">
        <div style="display: flex; justify-content: space-between; font-size: 10px; color: #333; margin-bottom: 15px;">
            <span onclick="toggleFullPlayer()" style="cursor:pointer">CLOSE</span>
            <span style="color: var(--accent)">● NOW PLAYING</span>
        </div>
        <div class="full-art-container">
            <img src="https://i.ytimg.com/vi/xy3AcmW0lrQ/maxresdefault.jpg" alt="Art">
        </div>
        <h2 class="full-title">COME THROUGH</h2>
        <p class="full-artist">THE WEEKND</p>

        <div class="progress-container">
            <input type="range" id="progressBar" value="0" step="0.1">
            <div class="time-info">
                <span id="currentTime">0:00</span>
                <span id="durationTime">0:00</span>
            </div>
        </div>

        <button class="play-pause-btn" id="fullPlayBtn" onclick="togglePlayPause(event)">PAUSE</button>
    </div>

    <div id="yt-player" style="display:none;"></div>

    <script>
        // Typewriter Effect
        const textElement = document.getElementById('typewriter'), text = "CALVYN";
        let index = 0, isDeleting = false;
        function type() {
            let speed = isDeleting ? 150 : 300;
            textElement.innerText = text.substring(0, index);
            if (!isDeleting && index < text.length) index++;
            else if (isDeleting && index > 0) index--;
            else { isDeleting = !isDeleting; speed = 2000; }
            setTimeout(type, speed);
        }

        // Music Logic
        let player;
        const videoId = 'xy3AcmW0lrQ';
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '0', width: '0', videoId: videoId,
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': videoId },
                events: { 'onReady': (e) => { e.target.setVolume(30); startTimer(); } }
            });
        }

        function startTimer() {
            setInterval(() => {
                if (player && player.getCurrentTime) {
                    const current = player.getCurrentTime();
                    const duration = player.getDuration();
                    document.getElementById('progressBar').value = (current / duration) * 100;
                    document.getElementById('currentTime').innerText = formatTime(current);
                    document.getElementById('durationTime').innerText = formatTime(duration);
                }
            }, 500);
        }

        function formatTime(s) {
            const m = Math.floor(s/60);
            const r = Math.floor(s%60);
            return `${m}:${r<10?'0':''}${r}`;
        }

        function togglePlayPause(e) {
            if(e) e.stopPropagation();
            const miniBtn = document.getElementById('miniPlayBtn');
            const fullBtn = document.getElementById('fullPlayBtn');
            if (player.getPlayerState() === 1) {
                player.pauseVideo();
                miniBtn.innerText = "▶";
                fullBtn.innerText = "PLAY";
            } else {
                player.playVideo();
                miniBtn.innerText = "||";
                fullBtn.innerText = "PAUSE";
            }
        }

        function toggleFullPlayer() {
            document.getElementById('fullPlayer').classList.toggle('active');
        }

        document.getElementById('progressBar').addEventListener('input', (e) => {
            const duration = player.getDuration();
            player.seekTo((e.target.value / 100) * duration);
        });

        window.onload = type;
        document.body.addEventListener('click', () => player && player.playVideo(), { once: true });
        
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.append(tag);
    </script>
</body>
</html>
