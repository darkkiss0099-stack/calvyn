<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALVYNBOYZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #fff; --secondary: #888; --bg: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            height: 100vh; 
            font-family: 'Rajdhani', sans-serif; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }

        /* --- Top Navigation Bar --- */
        .top-nav {
            position: fixed;
            top: 20px;
            width: 95%;
            max-width: 1400px;
            background: rgba(17, 17, 17, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            padding: 8px;
            display: flex;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .house-link { text-decoration: none; transition: transform 0.2s ease; }
        .house-link:hover { transform: scale(1.05); }
        .house-tag {
            background: #fff;
            color: #000;
            font-family: 'Orbitron';
            font-weight: 900;
            font-size: 0.7rem;
            padding: 6px 15px;
            border-radius: 20px;
            margin-right: 15px;
            text-transform: uppercase;
            display: inline-block;
        }

        .house-name {
            font-family: 'Orbitron';
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: #eee;
            text-transform: uppercase;
        }

        /* Background & Overlay */
        .bg-grid { position: fixed; inset: 0; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 20px; z-index: -1; filter: grayscale(1) brightness(0.2); transform: scale(1.1) rotate(-2deg); }
        .bg-card { background: url('https://img2.pic.in.th/475638765_916266083879572_6694404597216444166_n.jpg') center/cover; border-radius: 4px; }
        .overlay { position: fixed; inset: 0; background: radial-gradient(circle, transparent 20%, #000 100%); z-index: 0; }

        .main-content { position: relative; z-index: 10; text-align: center; width: 100%; max-width: 1200px; display: flex; flex-direction: column; gap: 25px; align-items: center; }

        /* Typography Section */
        .brand-header { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .brand-name { font-family: 'Orbitron'; font-size: 5.5rem; font-weight: 900; letter-spacing: 25px; border-right: 6px solid #fff; padding-right: 15px; text-shadow: 0 0 30px rgba(255,255,255,0.4); text-transform: uppercase; line-height: 1; }
        .brand-subtext { font-family: 'Orbitron'; font-size: 0.9rem; letter-spacing: 12px; color: var(--secondary); margin-top: 5px; }

        /* UI Elements - Main Plate */
        .center-ui-group { transform: scale(1.03); display: flex; flex-direction: column; align-items: center; width: 100%; margin-top: 5px; }
        .header-wrapper { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; color: #666; font-family: 'Orbitron'; font-size: 0.8rem; letter-spacing: 6px; }
        .divider-line { height: 1px; width: 100px; background: rgba(255, 255, 255, 0.15); }

        .pennales-plate { background: rgba(17, 17, 17, 0.95); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 18px 50px; text-decoration: none; color: #fff; transition: 0.3s; box-shadow: 0 10px 30px #000; backdrop-filter: blur(5px); margin-bottom: 15px; }
        .pennales-plate:hover { border-color: rgba(255,255,255,0.3); transform: translateY(-3px) scale(1.02); background: #1a1a1a; }
        .plate-title { font-family: 'Orbitron'; font-size: 1.3rem; font-weight: 700; letter-spacing: 4px; display: block; }
        .plate-sub { font-family: 'Orbitron'; font-size: 0.6rem; color: var(--secondary); letter-spacing: 4px; text-transform: uppercase; }

        /* Bottom UI */
        .bottom-ui { position: fixed; bottom: 30px; width: 95%; display: flex; justify-content: space-between; align-items: flex-end; z-index: 100; font-size: 0.6rem; }
        .music-mini-player { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.8); padding: 8px 16px; border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; }
        .album-art { width: 30px; height: 30px; border-radius: 2px; }

        @media (max-width: 768px) { 
            .brand-name { font-size: 2.2rem; letter-spacing: 8px; } 
            .brand-subtext { font-size: 0.6rem; letter-spacing: 6px; }
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="https://discord.gg/oneless" target="_blank" class="house-link">
            <div class="house-tag">ONELESS</div>
        </a>
        <div class="house-name">PROJECT</div>
    </div>

    <div class="bg-grid">
        <div class="bg-card"></div><div class="bg-card"></div><div class="bg-card"></div>
        <div class="bg-card"></div><div class="bg-card"></div><div class="bg-card"></div>
    </div>
    <div class="overlay"></div>

    <div class="main-content">
        <div class="brand-header">
            <div style="height: 100px; display: flex; align-items: center; justify-content: center;">
                <h1 class="brand-name" id="typewriter"></h1>
            </div>
            <div class="brand-subtext">ALL WAY TO STAR ONELESS</div>
        </div>

        <div class="center-ui-group">
            <div class="header-wrapper">
                <div class="divider-line"></div>MEMBER OFFICIAL<div class="divider-line"></div>
            </div>
            <a href="http://member.calvyn.site/#" target="_blank" class="pennales-plate">
                <span class="plate-title">CALVYN</span>
                <span class="plate-sub">LEADER</span>
            </a>
        </div>
    </div>

    <div class="bottom-ui">
        <div style="color: #333; font-weight: bold; letter-spacing: 2px;">SYSTEM DESIGN BY OSHI</div>
        <div class="music-mini-player">
            <img src="https://i.ytimg.com/vi/xy3AcmW0lrQ/maxresdefault.jpg" class="album-art" alt="Art">
            <div class="song-details">
                <h4 style="font-size: 0.65rem; color: #fff;">End of Beginning</h4>
                <p style="font-size: 0.5rem; color: #555;">NOW PLAYING</p>
            </div>
            <button onclick="togglePlayPause()" id="playBtn" style="background:none; border:none; color:#fff; cursor:pointer; margin-left:10px;">||</button>
        </div>
    </div>

    <div id="yt-player" style="display:none;"></div>

    <script>
        const textElement = document.getElementById('typewriter'), text = "CALVYN";
        let index = 0, isDeleting = false;

        function type() {
            let speed = isDeleting ? 100 : 250;
            textElement.innerText = text.substring(0, index);
            if (!isDeleting && index < text.length) index++;
            else if (isDeleting && index > 0) index--;
            else { isDeleting = !isDeleting; speed = isDeleting ? 2500 : 500; }
            setTimeout(type, speed);
        }

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '0', width: '0', videoId: 'xy3AcmW0lrQ',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'xy3AcmW0lrQ' },
                events: { 'onReady': (e) => e.target.setVolume(30) }
            });
        }

        function togglePlayPause() {
            const btn = document.getElementById('playBtn');
            if (player && player.getPlayerState() === 1) { player.pauseVideo(); btn.innerText = "▶"; }
            else if (player) { player.playVideo(); btn.innerText = "||"; }
        }

        window.onload = type;
        document.body.addEventListener('click', () => player && player.playVideo(), { once: true });
        
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.append(tag);
    </script>
</body>
</html>
