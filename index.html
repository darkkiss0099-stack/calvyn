<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALVYN | OFFICIAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root { --primary: #fff; --secondary: #444; --accent: #ff3333; }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        
        body { 
            background: #000;
            color: #fff; 
            height: 100vh; 
            font-family: 'Rajdhani', sans-serif; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        /* Background Image */
        .main-bg {
            position: fixed;
            inset: 0;
            background: url('https://img2.pic.in.th/asdsad50554b77f7067d99.png') center/cover no-repeat;
            z-index: -2;
            filter: brightness(0.25) grayscale(0.2);
        }
        .overlay { position: fixed; inset: 0; background: radial-gradient(circle, transparent 20%, #000 100%); z-index: -1; }

        /* Decorative Frame */
        .frame-line {
            position: fixed;
            inset: 40px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            pointer-events: none;
            z-index: 5;
            border-radius: 20px;
        }

        /* Branding UI Center */
        .main-content { 
            position: relative; 
            z-index: 10; 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        .est-text {
            font-family: 'Orbitron';
            font-size: 0.6rem;
            letter-spacing: 5px;
            color: var(--secondary);
            margin-bottom: 15px;
        }

        .brand-name { 
            font-family: 'Orbitron'; 
            font-size: 6rem; 
            font-weight: 900; 
            letter-spacing: 20px; 
            text-transform: uppercase; 
            line-height: 1;
            color: #e2e2e2;
            margin-bottom: 30px;
        }

        .member-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 10px 30px;
            border-radius: 4px;
            text-decoration: none;
            color: #666;
            transition: 0.4s;
            font-family: 'Orbitron';
            font-size: 0.65rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .member-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* --- Music Player UI --- */
        .bottom-ui { 
            position: fixed; 
            bottom: 40px; 
            right: 40px; 
            z-index: 100; 
        }

        /* Mini Player */
        .music-mini-player { 
            display: flex; 
            align-items: center; 
            background: rgba(15, 15, 15, 0.8); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            padding: 8px; 
            width: 260px;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }
        .mini-art { width: 35px; height: 35px; object-fit: cover; }
        .mini-info { flex: 1; padding-left: 12px; }
        .mini-title { font-family: 'Orbitron'; font-size: 0.6rem; font-weight: 700; display: block; letter-spacing: 1px; }
        .mini-artist { font-size: 0.5rem; color: #444; text-transform: uppercase; }
        .mini-btn { padding: 0 10px; font-size: 0.7rem; color: #fff; }

        /* Full Player (Right Side Layout) */
        .full-player {
            position: fixed; 
            bottom: 40px; 
            right: 40px; 
            width: 300px; 
            background: rgba(10, 10, 10, 0.95); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px; 
            z-index: 2000; 
            visibility: hidden; 
            opacity: 0; 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(20px);
            backdrop-filter: blur(20px);
        }
        .full-player.active { visibility: visible; opacity: 1; transform: translateX(0); }
        
        .player-header { display: flex; justify-content: space-between; font-size: 8px; font-family: 'Orbitron'; color: #333; margin-bottom: 15px; }
        .full-art { width: 100%; height: 160px; object-fit: cover; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; }
        .full-title { font-family: 'Orbitron'; font-size: 1rem; font-weight: 700; text-align: center; }
        .full-artist { font-size: 0.55rem; color: #444; text-align: center; margin-bottom: 20px; letter-spacing: 2px; }
        
        .progress-container { margin-bottom: 15px; }
        input[type="range"] { -webkit-appearance: none; width: 100%; background: #1a1a1a; height: 2px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 6px; height: 6px; background: var(--accent); cursor: pointer; }
        
        .play-pause-btn { 
            width: 100%; padding: 12px; background: #fff; color: #000; border: none; 
            font-family: 'Orbitron'; font-size: 0.65rem; font-weight: 900; cursor: pointer;
        }

        .credit-footer {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            font-family: 'Orbitron'; font-size: 0.5rem; color: #1a1a1a; letter-spacing: 4px;
        }

        @media (max-width: 768px) { 
            .brand-name { font-size: 2.5rem; letter-spacing: 10px; } 
            .bottom-ui, .full-player { right: 20px; bottom: 20px; width: calc(100% - 40px); }
        }
    </style>
</head>
<body>

    <div class="main-bg"></div>
    <div class="overlay"></div>
    <div class="frame-line"></div>

    <div class="main-content">
        <div class="est-text">EST. 2026</div>
        <h1 class="brand-name" id="typewriter"></h1>
        <a href="http://member.calvyn.site/#" target="_blank" class="member-btn">
            <i class="fa-solid fa-people-group"></i>
            <span>Members</span>
        </a>
    </div>

    <div class="credit-footer">SYSTEM DESIGN BY OSHI</div>

    <div class="bottom-ui" id="miniPlayerUI">
        <div class="music-mini-player" onclick="toggleFullPlayer()">
            <img src="https://i.ytimg.com/vi/xy3AcmW0lrQ/maxresdefault.jpg" class="mini-art" alt="Art">
            <div class="mini-info">
                <span class="mini-title">COME THROUGH</span>
                <span class="mini-artist">THE WEEKND</span>
            </div>
            <div class="mini-btn">||</div>
        </div>
    </div>

    <div class="full-player" id="fullPlayer">
        <div class="player-header">
            <span onclick="toggleFullPlayer()" style="cursor:pointer">✕ HIDE PLAYER</span>
            <span style="color:var(--accent)">● NOW PLAYING</span>
        </div>
        <img src="https://i.ytimg.com/vi/xy3AcmW0lrQ/maxresdefault.jpg" class="full-art" alt="Art">
        <h2 class="full-title">COME THROUGH</h2>
        <p class="full-artist">THE WEEKND</p>
        
        <div class="progress-container">
            <input type="range" id="progressBar" value="0">
            <div style="display:flex; justify-content:space-between; font-size:9px; color:#333; margin-top:5px;">
                <span id="currentTime">0:00</span>
                <span id="durationTime">0:00</span>
            </div>
        </div>
        
        <button class="play-pause-btn" id="fullPlayBtn" onclick="togglePlayPause(event)">PAUSE</button>
    </div>

    <div id="yt-player" style="display:none;"></div>

    <script>
        // Typewriter Effect
        const textElement = document.getElementById('typewriter'), text = "CALVYN";
        let index = 0, isDeleting = false;
        function type() {
            let speed = isDeleting ? 150 : 300;
            textElement.innerText = text.substring(0, index);
            if (!isDeleting && index < text.length) index++;
            else if (isDeleting && index > 0) index--;
            else { isDeleting = !isDeleting; speed = 2500; }
            setTimeout(type, speed);
        }

        // Music Player Logic
        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '0', width: '0', videoId: 'xy3AcmW0lrQ',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'xy3AcmW0lrQ' },
                events: { 'onReady': (e) => { e.target.setVolume(30); startProgress(); } }
            });
        }

        function startProgress() {
            setInterval(() => {
                if (player && player.getCurrentTime) {
                    const curr = player.getCurrentTime();
                    const dur = player.getDuration();
                    document.getElementById('progressBar').value = (curr / dur) * 100;
                    document.getElementById('currentTime').innerText = formatTime(curr);
                    document.getElementById('durationTime').innerText = formatTime(dur);
                }
            }, 500);
        }

        function formatTime(s) {
            const m = Math.floor(s/60);
            const r = Math.floor(s%60);
            return `${m}:${r < 10 ? '0' : ''}${r}`;
        }

        function togglePlayPause(e) {
            if(e) e.stopPropagation();
            const fBtn = document.getElementById('fullPlayBtn');
            if (player.getPlayerState() === 1) {
                player.pauseVideo();
                fBtn.innerText = "PLAY";
            } else {
                player.playVideo();
                fBtn.innerText = "PAUSE";
            }
        }

        function toggleFullPlayer() {
            const full = document.getElementById('fullPlayer');
            const mini = document.getElementById('miniPlayerUI');
            full.classList.toggle('active');
            // Hide mini player when full is open for cleaner look
            mini.style.opacity = full.classList.contains('active') ? "0" : "1";
        }

        document.getElementById('progressBar').addEventListener('input', (e) => {
            player.seekTo((e.target.value / 100) * player.getDuration());
        });

        window.onload = type;
        document.body.addEventListener('click', () => player && player.playVideo(), { once: true });
        
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.append(tag);
    </script>
</body>
</html>
